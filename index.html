    <script>
      (function () {
        try {
          var ts = Date.now();
          document.querySelectorAll('link[rel*="icon"]').forEach(function (link) {
            if (!link || !link.href) return;
            var base = link.href.split('?')[0];
            link.href = base + '?v=' + ts;
          });
        } catch (e) {}
      })();
    </script>
